<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Atomic World Clock — Live Time Zones</title>
    <meta name="description" content="An interactive world clock synced with atomic time servers. View live times across major cities, add custom regions, and track DST changes worldwide.">
    <meta property="og:title" content="SE Clock">
    <meta property="og:description" content="Interactive live atomic-synced clocks for cities worldwide.">
    <meta property="og:type" content="website">

    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   img-src 'self' https://upload.wikimedia.org;
                   connect-src 'self' https://worldtimeapi.org https://timeapi.io;
                   style-src 'self' 'unsafe-inline';
                   script-src 'self' 'unsafe-inline';
                   font-src 'self';">

    <style>
/* ============================================
   Atomic World Clock — styles.css
   ============================================ */

/* --- Theme Variables --- */
:root {
    --bg-color: #0f172a;
    --card-bg: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
    --accent-hover: #0284c7;
    --marker-bg: rgba(15, 23, 42, 0.9);
    --map-bg: #0b1120;
    --border-color: #475569;
    --danger: #f43f5e;
    --dst-color: #fbbf24;
    --success: #4ade80;
}

[data-theme="light"] {
    --bg-color: #f1f5f9;
    --card-bg: #ffffff;
    --text-main: #0f172a;
    --text-muted: #475569;
    --accent: #0284c7;
    --accent-hover: #0369a1;
    --marker-bg: rgba(255, 255, 255, 0.95);
    --map-bg: #e2e8f0;
    --border-color: #cbd5e1;
    --danger: #e11d48;
    --dst-color: #f59e0b;
    --success: #22c55e;
}

/* --- Base --- */
body {
    margin: 0;
    /* Increased bottom padding so the fixed footer doesn't cover content at the bottom */
    padding: 2rem 2rem 6rem 2rem; 
    font-family: system-ui, -apple-system, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
    transition: background-color 0.3s, color 0.3s;
}

/* --- Panel --- */
.panel {
    background-color: var(--card-bg);
    padding: 1.5rem 2rem;
    border-radius: 1rem;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    width: 100%;
    max-width: 1000px;
    box-sizing: border-box;
    transition: background-color 0.3s;
}

[data-theme="dark"] .panel {
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
}

/* --- Header --- */
.header-top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.5rem;
}

.header-panel {
    margin-bottom: 2rem;
}

.main-clock {
    text-align: left;
}

.status-container {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
}

.status-text {
    display: flex;
    flex-direction: column;
}

#sync-status {
    font-size: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.1rem;
}

#discrepancy-status {
    font-size: 0.8rem;
    font-style: italic;
    color: var(--text-muted);
}

/* --- Buttons --- */
#resync-btn,
#theme-toggle-btn {
    background-color: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    border-radius: 0.25rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
}

#resync-btn:hover:not(:disabled),
#theme-toggle-btn:hover {
    background-color: var(--accent);
    color: var(--card-bg);
}

#resync-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    border-color: var(--text-muted);
    color: var(--text-muted);
}

/* --- Time Display --- */
.time-display-wrapper {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.25rem;
}

#main-time {
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    margin: 0;
    font-variant-numeric: tabular-nums;
    color: var(--text-main);
}

.dst-badge {
    font-size: 0.8rem;
    padding: 0.2rem 0.5rem;
    border-radius: 1rem;
    font-weight: bold;
    display: none;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
}

.dst-active {
    background-color: var(--accent);
    color: var(--card-bg);
}

.dst-inactive {
    background-color: var(--text-muted);
    color: var(--card-bg);
}

.dst-na {
    background-color: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-muted);
    box-shadow: none;
}

.city-dst {
    margin-top: 0.4rem;
    font-size: 0.7rem;
    letter-spacing: 0.5px;
    display: none;
}

#main-date {
    font-size: 1rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
}

/* --- Controls --- */
.controls {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-top: 1rem;
}

.control-group {
    display: flex;
    flex-direction: column;
}

.input-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
}

label {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
}

select,
input {
    padding: 0.5rem;
    border-radius: 0.25rem;
    border: 1px solid var(--border-color);
    background-color: var(--bg-color);
    color: var(--text-main);
    font-size: 0.9rem;
    outline: none;
    transition: background-color 0.3s, color 0.3s, border-color 0.3s;
}

select:focus,
input:focus {
    border-color: var(--accent);
}

.primary-btn {
    background-color: var(--accent);
    color: #fff;
    border: none;
    padding: 0.6rem 1rem;
    border-radius: 0.25rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s;
}

.primary-btn:hover {
    background-color: var(--accent-hover);
}

.secondary-btn {
    background-color: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0.5rem 0.75rem;
    border-radius: 0.25rem;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
}

.secondary-btn:hover {
    background-color: var(--accent);
    color: var(--card-bg);
}

.danger-btn {
    color: var(--danger);
    border-color: var(--danger);
}

.danger-btn:hover {
    background-color: var(--danger);
    color: #fff;
}

/* --- Utility classes --- */
.input-tz-main {
    width: 280px;
}

.input-days {
    width: 80px;
}

.input-tz-add {
    width: 240px;
}

.hidden {
    display: none;
}

.flex-grow {
    flex-grow: 1;
}

/* --- Clock Grid Section --- */
.clock-grid-container {
    width: 100%;
    max-width: 1000px;
}

.clock-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
    width: 100%;
}

.clock-card {
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    padding: 1.5rem;
    border-radius: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s, border-color 0.3s, opacity 0.2s;
    cursor: grab;
    user-select: none;
}

.clock-card:active {
    cursor: grabbing;
}

.clock-card.dragging {
    opacity: 0.4;
    transform: scale(0.98);
}

.clock-card.drag-over {
    border: 2px dashed var(--accent);
    background-color: rgba(56, 189, 248, 0.05);
    transform: scale(1.02);
}

.clock-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
    border-color: var(--accent);
}

[data-theme="dark"] .clock-card {
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
}

[data-theme="dark"] .clock-card:hover {
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
}

.card-remove-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    padding: 4px;
    border-radius: 50%;
    transition: color 0.2s, background-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
}

.card-remove-btn:hover {
    color: var(--danger);
    background-color: rgba(244, 63, 94, 0.1);
}

.city-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.5rem;
    text-align: center;
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.city-time {
    font-size: 2.2rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--text-main);
    line-height: 1;
    margin-bottom: 0.5rem;
}

.city-date {
    font-size: 0.8rem;
    color: var(--text-muted);
}

/* --- Add Region Panel --- */
.add-region-panel h3 {
    margin-top: 0;
    margin-bottom: 0.5rem;
    font-size: 1.2rem;
    color: var(--text-main);
}

.form-row {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
}

.form-hint {
    font-size: 0.8rem;
    color: var(--accent);
    margin-bottom: 1rem;
    display: block;
}

.data-management-row {
    display: flex;
    gap: 1rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border-color);
    flex-wrap: wrap;
}

/* --- Fixed Footer --- */
.app-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background-color: var(--card-bg);
    border-top: 1px solid var(--border-color);
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    line-height: 1.5;
    padding: 0.75rem;
    box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.2);
    z-index: 1000;
    transition: background-color 0.3s;
}

.app-footer p {
    margin: 0.2rem 0;
}

.app-footer strong {
    color: var(--accent);
}
    </style>
</head>
<body>

    <div class="panel header-panel" role="banner">
        <div class="header-top-bar">
            <div class="status-container">
                <div class="status-text">
                    <div id="sync-status" role="status" aria-live="polite">Contacting Time Servers...</div>
                    <div id="discrepancy-status" aria-live="polite">Calculating hardware offset...</div>
                </div>
                <button id="resync-btn" aria-label="Re-synchronize with atomic time server">↻ Re-sync Now</button>
            </div>
            <button id="theme-toggle-btn" aria-label="Toggle light and dark theme">🌓 Toggle Theme</button>
        </div>

        <div class="main-clock">
            <div class="time-display-wrapper">
                <div id="main-time" role="timer" aria-live="polite" aria-label="Current time in selected timezone">00:00:00</div>
                <span id="main-dst-badge" class="dst-badge" aria-label="Daylight Saving Time status">DST: N/A</span>
            </div>
            <div id="main-date" aria-label="Current date in selected timezone">Loading Date...</div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="timezone-select">Search Main Time Zone (Country, City, TZ)</label>
                <div class="input-row">
                    <input type="text" id="timezone-select" list="main-tz-list" placeholder="e.g. Japan, London..." class="input-tz-main" autocomplete="off">
                    <datalist id="main-tz-list"></datalist>
                    <button id="set-default-btn" class="secondary-btn" title="Set current selection as default on reload" aria-label="Save current timezone as default">Set Default</button>
                </div>
            </div>
            <div class="control-group">
                <label for="add-days">Add Days (Global)</label>
                <input type="number" id="add-days" value="0" step="1" class="input-days" aria-label="Add or subtract days from all displayed times">
            </div>
        </div>
    </div>

    <div class="clock-grid-container">
        <div id="clock-grid" class="clock-grid" aria-label="Grid of configured world clocks" role="list"></div>
    </div>

    <div class="panel add-region-panel">
        <h3>Add New Clock</h3>
        <span class="form-hint">Add a new city or timezone to your dashboard.</span>

        <div class="form-row">
            <div class="control-group">
                <label for="custom-name">Display Name</label>
                <input type="text" id="custom-name" placeholder="e.g., Berlin" maxlength="100" autocomplete="off">
            </div>
            <div class="control-group">
                <label for="custom-tz">Time Zone Search (Country, City)</label>
                <input type="text" id="custom-tz" placeholder="e.g., Germany, Berlin..." list="tz-list" class="input-tz-add" autocomplete="off">
                <datalist id="tz-list"></datalist>
            </div>
            <div class="control-group" style="align-self: flex-end;">
                <button id="add-city-btn" class="primary-btn" aria-label="Add this city to the dashboard">Add Clock</button>
            </div>
        </div>

        <div class="data-management-row">
            <button id="export-btn" class="secondary-btn" aria-label="Export custom cities as JSON backup">⬇ Export Custom Cities</button>
            <button id="import-btn" class="secondary-btn" aria-label="Import cities from a JSON backup file">⬆ Import Backup</button>
            <input type="file" id="import-file" accept=".json" class="hidden">
            <div class="flex-grow"></div>
            <button id="clear-btn" class="secondary-btn danger-btn" aria-label="Remove all custom cities from the map">✖ Clear Custom Cities</button>
        </div>
    </div>

    <footer class="app-footer">
        <p>Developed by <strong>Serge E.</strong> using Gemini / Claude AI.</p>
        <p>Main purpose is to help in manual synching Seiko / Casio watches or any watch types.</p>
    </footer>

    // --- DST Calculation ---
    function getTzOffsetMinutes(tz, date) {
        try {
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: tz, timeZoneName: 'shortOffset', hour12: false
            }).formatToParts(date);
            const tzPart = parts.find(p => p.type === 'timeZoneName').value;
            if (tzPart === 'GMT') return 0;
            const match = tzPart.match(/GMT([+-])(\d+)(?::(\d+))?/);
            if (!match) return 0;
            return (match[1] === '+' ? 1 : -1) * (parseInt(match[2], 10) * 60 + (match[3] ? parseInt(match[3], 10) : 0));
        } catch (e) {
            console.warn(`Failed to get offset for timezone "${tz}":`, e.message);
            return 0;
        }
    }

    function getDstStatus(tz, date) {
        try {
            const year = date.getFullYear();
            const janOff = getTzOffsetMinutes(tz, new Date(year, 0, 1));
            const julOff = getTzOffsetMinutes(tz, new Date(year, 6, 1));
            
            // If offset doesn't change, they don't observe DST
            if (janOff === julOff) return 'NA';
            
            // If it does change, the larger offset is DST (summer time)
            const currentOff = getTzOffsetMinutes(tz, date);
            return currentOff === Math.max(janOff, julOff) ? 'ACTIVE' : 'INACTIVE';
        } catch (e) {
            console.warn(`DST check failed for timezone "${tz}":`, e.message);
            return 'NA';
        }
    }

                const draggedIndex = cities.findIndex(c => c.id === draggedCityId);
                const targetIndex = cities.findIndex(c => c.id === city.id);

                    const [draggedCity] = cities.splice(draggedIndex, 1);

    async function syncAtomicTime() {
        resyncBtn.disabled = true;
        resyncBtn.textContent = '↻ Syncing...';
        syncStatusEl.textContent = 'Contacting Time Servers...';
        syncStatusEl.style.color = 'var(--accent)';
        discrepancyEl.textContent = 'Calculating hardware offset...';
        discrepancyEl.style.color = 'var(--text-muted)';

        let atomicTimeMs = null;
        try {
            const response = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            atomicTimeMs = new Date(data.datetime).getTime();
            syncStatusEl.textContent = 'Synced with WorldTimeAPI.org';
        } catch (err1) {
            console.warn('WorldTimeAPI failed:', err1.message);
            try {
                const response2 = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=UTC');
                if (!response2.ok) throw new Error(`HTTP ${response2.status}`);
                const data2 = await response2.json();
                atomicTimeMs = new Date(data2.dateTime + 'Z').getTime();
                syncStatusEl.textContent = 'Synced with TimeAPI.io';
            } catch (err2) {
                console.warn('TimeAPI.io also failed:', err2.message);
            }
        }

        try {
            if (!atomicTimeMs) throw new Error('No atomic time source available');
            const localSystemTime = Date.now();
            atomicOffsetMs = atomicTimeMs - localSystemTime;
            const discrepancySecs = Math.abs(atomicOffsetMs) / 1000;

            syncStatusEl.style.color = 'var(--success)';
            if (atomicOffsetMs > 50) {
                discrepancyEl.textContent = `Local clock is ${discrepancySecs.toFixed(3)}s behind atomic time.`;
                discrepancyEl.style.color = 'var(--dst-color)';
            } else if (atomicOffsetMs < -50) {
                discrepancyEl.textContent = `Local clock is ${discrepancySecs.toFixed(3)}s ahead of atomic time.`;
                discrepancyEl.style.color = 'var(--dst-color)';
            } else {
                discrepancyEl.textContent = 'Local clock is perfectly synced.';
                discrepancyEl.style.color = 'var(--success)';
            }
        } catch (error) {
            console.warn('Time sync resolution failed:', error.message);
            syncStatusEl.textContent = 'Connection Failed. Using Local Time';
            syncStatusEl.style.color = 'var(--danger)';
            discrepancyEl.textContent = 'Discrepancy: Unknown (Offline / Blocked)';
            discrepancyEl.style.color = 'var(--danger)';
        } finally {
            resyncBtn.disabled = false;
            resyncBtn.textContent = '↻ Re-sync Now';
        }
    }

    function updateClocks() {
        const msInADay = 86400000;
        const now = new Date(Date.now() + atomicOffsetMs + (addedDays * msInADay));

        // Main Clock Update
        try {
            const timeOpts = { timeZone: selectedTimezone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const dateOpts = { timeZone: selectedTimezone, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            mainTimeEl.textContent = new Intl.DateTimeFormat('en-US', timeOpts).format(now);
            mainDateEl.textContent = new Intl.DateTimeFormat('en-US', dateOpts).format(now);
            
            const mainStatus = getDstStatus(selectedTimezone, now);
            mainDstBadge.textContent = 'DST: ' + (mainStatus === 'NA' ? 'N/A' : (mainStatus === 'ACTIVE' ? 'Active' : 'Inactive'));
            mainDstBadge.className = `dst-badge dst-${mainStatus.toLowerCase()}`;
            mainDstBadge.style.display = 'inline-block';
        } catch (e) {
            console.warn(`Failed to update main clock for "${selectedTimezone}":`, e.message);
        }

        // City Map Clocks Update
        cities.forEach(city => {
            try {
                const safeId = sanitizeId(city.id);
                const timeOpts = { timeZone: city.tz, hour: '2-digit', minute: '2-digit', hour12: false };
                const timeStr = new Intl.DateTimeFormat('en-US', timeOpts).format(now);
                const dateOpts = { timeZone: city.tz, weekday: 'short', month: 'short', day: 'numeric' };
                const dateStr = new Intl.DateTimeFormat('en-US', dateOpts).format(now);

                const cityTimeEl = document.getElementById(`time-${safeId}`);
                const cityDateEl = document.getElementById(`date-${safeId}`);
                const cityDstEl = document.getElementById(`dst-${safeId}`);

                if (cityTimeEl) cityTimeEl.textContent = timeStr;
                if (cityDateEl) cityDateEl.textContent = dateStr;
                if (cityDstEl) {
                    const status = getDstStatus(city.tz, now);
                    cityDstEl.textContent = 'DST: ' + (status === 'NA' ? 'N/A' : (status === 'ACTIVE' ? 'Active' : 'Inactive'));
                    cityDstEl.className = `dst-badge city-dst dst-${status.toLowerCase()}`;
                    cityDstEl.style.display = 'inline-block';
                }
            } catch (e) {
                console.warn(`Failed to update clock for city "${city.name}" (${city.tz}):`, e.message);
            }
        });
    }

    // --- Second-Boundary Aligned Clock Tick ---
    function scheduleNextTick() {
        const now = Date.now() + atomicOffsetMs;
        const msUntilNextSecond = 1000 - (now % 1000);
        clockIntervalId = setTimeout(() => {
            updateClocks();
            scheduleNextTick();
        }, msUntilNextSecond);
    }

    // --- Interactivity ---
    document.getElementById('add-city-btn').addEventListener('click', () => {
        const name = document.getElementById('custom-name').value.trim();
        const rawTz = document.getElementById('custom-tz').value.trim();
        const tz = parseTzFromInput(rawTz);

        if (!name || !tz) {
            alert('Please fill in both fields.');
            return;
        }
        if (name.length > 100) {
            alert('Display name is too long (max 100 characters).');
            return;
        }
        try {
            new Intl.DateTimeFormat('en-US', { timeZone: tz }).format(new Date());
        } catch (e) {
            alert(`Invalid Time Zone: "${tz}".`);
            return;
        }

        const newCity = { id: 'custom-' + Date.now(), name, tz };
        cities.push(newCity);
        customCities.push(newCity);
        localStorage.setItem('atomicClockCustomCities', JSON.stringify(customCities));
        renderClockGrid();

        document.getElementById('custom-name').value = '';
        document.getElementById('custom-tz').value = '';
    });

    // Export with safe URL revocation
    document.getElementById('export-btn').addEventListener('click', () => {
        if (customCities.length === 0) {
            alert("You don't have any custom cities to export yet!");
            return;
        }
        const blob = new Blob([JSON.stringify(customCities, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'world_clock_backup.json';
        a.click();
        // Delay revocation to ensure the download starts
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    });

    // Import with full validation
    const importFileInput = document.getElementById('import-file');
    document.getElementById('import-btn').addEventListener('click', () => { importFileInput.click(); });
    importFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const importedData = JSON.parse(event.target.result);
                if (!Array.isArray(importedData)) throw new Error('Imported data is not an array.');

                // Validate each city object
                const validCities = importedData.filter(city => {
                    const isValid = validateCityObject(city);
                    if (!isValid) console.warn('Skipping invalid city object during import:', city);
                    return isValid;
                });

                if (validCities.length === 0) {
                    alert('No valid city entries found in the import file.');
                    return;
                }

                customCities = [...customCities, ...validCities];
                // Deduplicate by ID
                const uniqueIds = new Set();
                customCities = customCities.filter(city => {
                    if (uniqueIds.has(city.id)) return false;
                    uniqueIds.add(city.id);
                    return true;
                });

                cities = [...getActiveDefaults(), ...customCities];
                localStorage.setItem('atomicClockCustomCities', JSON.stringify(customCities));
                renderClockGrid();
                alert(`Successfully imported ${validCities.length} city/cities!`);
            } catch (err) {
                console.warn('Import failed:', err.message);
                alert("Error importing file. Make sure it's a valid JSON backup file.");
            }
            importFileInput.value = '';
        };
        reader.readAsText(file);
    });

    // Clear without full page reload
    document.getElementById('clear-btn').addEventListener('click', () => {
        if (confirm('Are you sure you want to restore defaults and remove all custom clocks?')) {
            customCities = [];
            removedDefaults = [];
            localStorage.setItem('atomicClockCustomCities', JSON.stringify(customCities));
            localStorage.setItem('atomicClockRemovedDefaults', JSON.stringify(removedDefaults));
            cities = [...getActiveDefaults(), ...customCities];
            renderClockGrid();
        }
    });

    resyncBtn.addEventListener('click', syncAtomicTime);

    // Timezone selection handler
    timezoneSelect.addEventListener('change', (e) => {
        const inputTz = parseTzFromInput(e.target.value);
        try {
            new Intl.DateTimeFormat('en-US', { timeZone: inputTz });
            selectedTimezone = inputTz;
            timezoneSelect.style.borderColor = 'var(--border-color)';
            updateClocks();
        } catch (err) {
            timezoneSelect.style.borderColor = 'var(--danger)';
        }
    });

    setDefaultBtn.addEventListener('click', () => {
        localStorage.setItem('atomicClockDefaultTZ', selectedTimezone);
        const originalText = setDefaultBtn.textContent;
        setDefaultBtn.textContent = '✓ Saved!';
        setDefaultBtn.style.backgroundColor = 'var(--accent)';
        setDefaultBtn.style.color = 'var(--card-bg)';
        setTimeout(() => {
            setDefaultBtn.textContent = originalText;
            setDefaultBtn.style.backgroundColor = 'transparent';
            setDefaultBtn.style.color = 'var(--accent)';
        }, 1500);
    });

    addDaysInput.addEventListener('input', (e) => {
        addedDays = parseInt(e.target.value) || 0;
        updateClocks();
    });

    // --- App Boot ---
    initTimezoneDropdown();
    renderClockGrid();
    syncAtomicTime().then(() => {
        updateClocks();
        // Aligned clock tick instead of raw setInterval
        scheduleNextTick();
        // Auto re-sync every 10 minutes
        resyncIntervalId = setInterval(syncAtomicTime, RESYNC_INTERVAL_MS);
    });

})();
    </script>
</body>

</html>
